<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Мениджър на чувствата</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#2d333b;
  --b1:#30363d;--b2:#444c56;
  --t1:#e8f0f8;--t2:#a0aeba;--t3:#7a8a98;
  --pos:#57ab5a;--pos-l:rgba(87,171,90,.15);
  --neg:#e5534b;--neg-l:rgba(229,83,75,.13);
  --acc:#539bf5;
  --r:10px;
}
html,body{height:100%;background:var(--bg);color:var(--t1);
  font-family:'Consolas','Courier New',monospace;font-size:14px;line-height:1;overflow:hidden}
.shell{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* TOPBAR */
.topbar{background:var(--bg2);border-bottom:1px solid var(--b1);padding:0 14px;
  height:44px;flex-shrink:0;display:flex;align-items:center;gap:8px;user-select:none}
.dots{display:flex;gap:5px}
.dot{width:11px;height:11px;border-radius:50%}
.dot.r{background:#e5534b}.dot.y{background:#c69026}.dot.g{background:#57ab5a}
.topbar-title{font-size:12px;color:var(--t3);flex:1;text-align:center;letter-spacing:.03em}
.sync{width:7px;height:7px;border-radius:50%;background:var(--t3);transition:background .3s}
.sync.ok{background:var(--pos)}.sync.err{background:var(--neg)}.sync.busy{background:var(--acc)}
.clock{font-size:11px;color:var(--t2);min-width:58px;text-align:right}

/* CONTENT */
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.page{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0}
.page.active{display:flex}

/* TAB BAR — bottom on mobile */
.tab-bar{display:flex;background:var(--bg2);border-top:1px solid var(--b1);
  flex-shrink:0;height:56px;padding-bottom:env(safe-area-inset-bottom,0)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;font-size:10px;color:var(--t3);cursor:pointer;
  border:none;background:transparent;border-top:2px solid transparent}
.tab-btn.active{color:var(--acc);border-top-color:var(--acc)}
.tab-icon{font-size:20px;line-height:1}

/* ── ЗАПИС ── */
.record-scroll{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}

.score-card{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);
  padding:16px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.score-num{font-size:40px;font-weight:700;line-height:1;min-width:80px}
.score-num.pos{color:var(--pos)}.score-num.neg{color:var(--neg)}.score-num.zero{color:var(--t1)}
.score-info{display:flex;flex-direction:column;gap:4px;min-width:0}
.score-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}
.score-dom{font-size:12px;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.action-row{display:flex;gap:8px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.dt-inp,.tm-inp{background:var(--bg3);border:1px solid var(--b2);color:var(--t1);
  font-family:inherit;font-size:14px;padding:12px 10px;border-radius:8px;cursor:pointer;flex:1;min-width:0}
.tm-inp{flex:0 0 96px}
.save-btn{padding:12px 18px;font-size:14px;font-family:inherit;
  border:1px solid rgba(87,171,90,.5);background:var(--pos-l);color:var(--pos);
  border-radius:8px;cursor:pointer;font-weight:600;flex-shrink:0}
.save-btn:active{opacity:.7}
.clear-btn{padding:12px 14px;font-size:14px;font-family:inherit;
  border:1px solid var(--b2);background:transparent;color:var(--t2);border-radius:8px;cursor:pointer}
.clear-btn:active{opacity:.7}

.grp-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;padding:2px 2px;flex-shrink:0}
.grp-lbl.pos{color:rgba(87,171,90,.8)}.grp-lbl.neg{color:rgba(229,83,75,.8)}

.emo-row{background:var(--bg2);border:1px solid var(--b1);border-radius:8px;
  margin-bottom:6px;overflow:hidden;flex-shrink:0}
.emo-row.sel-pos{border-color:rgba(87,171,90,.5);background:var(--pos-l)}
.emo-row.sel-neg{border-color:rgba(229,83,75,.4);background:var(--neg-l)}
.emo-main{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;min-height:50px}
.emo-chk{width:20px;height:20px;border:1.5px solid var(--b2);border-radius:5px;
  display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.emo-chk.on.pos{border-color:var(--pos);color:var(--pos);background:rgba(87,171,90,.2)}
.emo-chk.on.neg{border-color:var(--neg);color:var(--neg);background:rgba(229,83,75,.18)}
.emo-name{flex:1;font-size:15px;color:var(--t1)}
.emo-base{font-size:13px;font-weight:600;min-width:28px;text-align:right}
.emo-base.pos{color:var(--pos)}.emo-base.neg{color:var(--neg)}
.emo-eff{font-size:14px;font-weight:700;min-width:38px;text-align:right}
.emo-eff.pos{color:var(--pos)}.emo-eff.neg{color:var(--neg)}.emo-eff.dim{color:var(--t3)}
.emo-sl{display:none;padding:6px 14px 13px;align-items:center;gap:10px}
.emo-sl.show{display:flex}
.emo-sl input[type=range]{flex:1;height:3px;accent-color:var(--acc);cursor:pointer}
.sl-val{font-size:12px;color:var(--t2);min-width:20px;text-align:right}
.sl-lbl{font-size:10px;color:var(--t3);white-space:nowrap}

/* ── ДНЕВНИК ── */
.journal-page{overflow:hidden}
.date-nav{display:flex;align-items:center;gap:8px;padding:10px 12px;
  background:var(--bg2);border-bottom:1px solid var(--b1);flex-shrink:0}
.date-nav input{flex:1;background:var(--bg3);border:1px solid var(--b2);color:var(--t1);
  font-family:inherit;font-size:14px;padding:10px;border-radius:8px;cursor:pointer}
.nav-arrow{padding:10px 14px;font-size:18px;border:1px solid var(--b2);
  background:transparent;color:var(--t2);border-radius:8px;cursor:pointer;font-family:inherit}
.nav-arrow:active{background:var(--bg3)}
.journal-scroll{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}

.j-card{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:14px}
.j-card-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;
  margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.j-ts{color:var(--t2);text-transform:none;letter-spacing:0;font-size:11px}
.pills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.pill{display:inline-block;padding:4px 9px;border-radius:5px;font-size:12px;border:1px solid transparent}
.pill.pos{color:var(--pos);border-color:rgba(87,171,90,.3);background:rgba(87,171,90,.1)}
.pill.neg{color:var(--neg);border-color:rgba(229,83,75,.25);background:rgba(229,83,75,.09)}
.j-foot{display:flex;align-items:center;gap:10px}
.j-score{font-size:18px;font-weight:700}
.j-score.pos{color:var(--pos)}.j-score.neg{color:var(--neg)}.j-score.zero{color:var(--t1)}
.j-del{margin-left:auto;font-size:12px;color:var(--t3);cursor:pointer;
  padding:5px 10px;border:1px solid var(--b1);border-radius:5px;background:transparent;font-family:inherit}
.j-del:active{color:var(--neg);border-color:rgba(229,83,75,.4)}
.sum-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0}
.sum-key{color:var(--t2)}.sum-val{color:var(--t1)}
.sum-val.pos{color:var(--pos);font-weight:600}.sum-val.neg{color:var(--neg);font-weight:600}
.empty-day{padding:20px;text-align:center;font-size:13px;color:var(--t3)}

/* ── ГРАФИКИ ── */
.graphs-scroll{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.period-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;flex-shrink:0}
.period-scroll::-webkit-scrollbar{display:none}
.per-btn{padding:8px 16px;font-size:13px;color:var(--t3);cursor:pointer;
  border:1px solid var(--b1);border-radius:20px;white-space:nowrap;
  background:transparent;font-family:inherit;flex-shrink:0}
.per-btn.active{color:var(--acc);border-color:var(--acc);background:rgba(83,155,245,.08)}
.mode-row{display:flex;gap:6px;flex-shrink:0}
.mode-btn{padding:8px 16px;font-size:13px;color:var(--t3);cursor:pointer;
  border:1px solid var(--b1);border-radius:8px;background:transparent;font-family:inherit}
.mode-btn.active{color:var(--acc);border-color:rgba(83,155,245,.4);background:rgba(83,155,245,.08)}
.chart-card{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:14px;flex-shrink:0}
.chart-card-title{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.chart-wrap{position:relative;width:100%;height:200px}
.chart-wrap canvas{position:absolute;inset:0;width:100%!important;height:100%!important}

/* ── АРХИВ ── */
.archive-page{overflow:hidden}
.arch-bar{padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--b1);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.arch-count{font-size:13px;color:var(--t2)}
.arch-clear-btn{font-size:12px;color:var(--neg);cursor:pointer;padding:6px 12px;
  border:1px solid rgba(229,83,75,.3);border-radius:6px;background:transparent;font-family:inherit}
.arch-scroll{flex:1;overflow-y:auto}
.arch-entry{padding:14px;border-bottom:1px solid rgba(48,54,61,.4)}
.arch-dt{font-size:11px;color:var(--t2);margin-bottom:6px}
.arch-pills{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px}
.arch-foot{display:flex;align-items:center;gap:10px}
.arch-score{font-size:16px;font-weight:700}
.arch-score.pos{color:var(--pos)}.arch-score.neg{color:var(--neg)}.arch-score.zero{color:var(--t1)}
.arch-del{margin-left:auto;font-size:11px;color:var(--t2);cursor:pointer;
  padding:4px 10px;border:1px solid var(--b1);border-radius:5px;background:transparent;font-family:inherit}
.arch-del:active{color:var(--neg)}
.arch-empty{padding:32px;text-align:center;font-size:13px;color:var(--t3)}

/* ── DESKTOP ── */
@media(min-width:768px){
  html,body{font-size:13px}
  .shell{flex-direction:column}
  .tab-bar{order:-1;border-top:none;border-bottom:1px solid var(--b1);height:36px;padding-bottom:0}
  .tab-btn{flex-direction:row;gap:6px;font-size:12px;border-top:none;border-bottom:2px solid transparent}
  .tab-btn.active{border-bottom-color:var(--acc);border-top:none}
  .tab-icon{font-size:13px}
  .score-num{font-size:28px;min-width:60px}
  .emo-main{padding:8px 12px;min-height:36px}
  .emo-chk{width:14px;height:14px;border-radius:3px;font-size:9px}
  .emo-name{font-size:13px}
  .emo-sl{padding:3px 12px 8px}
  .save-btn,.clear-btn{padding:8px 14px;font-size:13px}
  .dt-inp,.tm-inp{padding:8px 10px;font-size:13px}
  .chart-wrap{height:150px}
}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="dots"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div></div>
    <div class="topbar-title">Мениджър на чувствата</div>
    <div class="sync" id="sync"></div>
    <div class="clock" id="clock"></div>
  </div>

  <div class="content">
    <!-- ЗАПИС -->
    <div class="page active" id="page-record">
      <div class="record-scroll">
        <div class="score-card">
          <div class="score-num zero" id="score-num">0</div>
          <div class="score-info">
            <div class="score-lbl">Обща оценка</div>
            <div class="score-dom" id="score-dom">Изберете чувства</div>
          </div>
        </div>
        <div class="action-row">
          <input type="date" class="dt-inp" id="inp-date">
          <input type="time" class="tm-inp" id="inp-time">
          <button class="save-btn" onclick="saveEntry()">▶ Запази</button>
          <button class="clear-btn" onclick="clearSel()">✕</button>
        </div>
        <div class="grp-lbl pos">▲ Положителни</div>
        <div id="pos-list"></div>
        <div class="grp-lbl neg">▼ Отрицателни</div>
        <div id="neg-list"></div>
      </div>
    </div>

    <!-- ДНЕВНИК -->
    <div class="page journal-page" id="page-journal">
      <div class="date-nav">
        <button class="nav-arrow" onclick="shiftDate(-1)">‹</button>
        <input type="date" id="journal-date">
        <button class="nav-arrow" onclick="shiftDate(1)">›</button>
      </div>
      <div class="journal-scroll" id="journal-scroll"></div>
    </div>

    <!-- ГРАФИКИ -->
    <div class="page" id="page-graphs">
      <div class="graphs-scroll">
        <div class="period-scroll">
          <button class="per-btn active" onclick="setPeriod(7,this)">7 дни</button>
          <button class="per-btn" onclick="setPeriod(30,this)">30 дни</button>
          <button class="per-btn" onclick="setPeriod(90,this)">3 мес</button>
          <button class="per-btn" onclick="setPeriod(180,this)">6 мес</button>
          <button class="per-btn" onclick="setPeriod(270,this)">9 мес</button>
          <button class="per-btn" onclick="setPeriod(365,this)">1 год</button>
        </div>
        <div class="mode-row">
          <button class="mode-btn active" onclick="setMode('score',this)">Оценка</button>
          <button class="mode-btn" onclick="setMode('freq',this)">Честота</button>
        </div>
        <div class="chart-card">
          <div class="chart-card-title" id="chart-title">Оценка по дни</div>
          <div class="chart-wrap"><canvas id="main-chart"></canvas></div>
        </div>
      </div>
    </div>

    <!-- АРХИВ -->
    <div class="page archive-page" id="page-archive">
      <div class="arch-bar">
        <span class="arch-count" id="arch-count">0 записа</span>
        <button class="arch-clear-btn" onclick="clearArchive()">✕ Изчисти</button>
      </div>
      <div class="arch-scroll" id="arch-scroll"></div>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="goTab('record',this)">
      <span class="tab-icon">✎</span><span>Запис</span>
    </button>
    <button class="tab-btn" onclick="goTab('journal',this)">
      <span class="tab-icon">◷</span><span>Дневник</span>
    </button>
    <button class="tab-btn" onclick="goTab('graphs',this)">
      <span class="tab-icon">▦</span><span>Графики</span>
    </button>
    <button class="tab-btn" onclick="goTab('archive',this)">
      <span class="tab-icon">☰</span><span>Архив</span>
    </button>
  </div>
</div>

<script>
'use strict';
const EMO=[
  {id:'shtastie',  name:'Щастие',      base:10},
  {id:'lyubov',    name:'Любов',        base:9},
  {id:'radost',    name:'Радост',       base:8},
  {id:'pylnota',   name:'Пълнота',      base:8},
  {id:'optimizym', name:'Оптимизъм',    base:7},
  {id:'dovolstvo', name:'Доволство',    base:6},
  {id:'osyznatost',name:'Осъзнатост',   base:5},
  {id:'otchaianie',name:'Отчаяние',     base:-9},
  {id:'zaguba',    name:'Загуба',       base:-8},
  {id:'bezizkh',   name:'Безизходица',  base:-8},
  {id:'gnyav',     name:'Гняв',         base:-7},
  {id:'othurlyan', name:'Отхвърленост', base:-7},
  {id:'tyaga',     name:'Тъга',         base:-6},
  {id:'samota',    name:'Самота',       base:-6},
  {id:'trevoshno', name:'Тревожност',   base:-5},
  {id:'revnost',   name:'Ревност',      base:-5},
  {id:'lipsa',     name:'Липса',        base:-4},
  {id:'sazhalenie',name:'Съжаление',    base:-4},
  {id:'osajdane',  name:'Осъждане',     base:-3},
];
const POS='#57ab5a',NEG='#e5534b',ACC='#539bf5',GRID='rgba(48,54,61,.6)',MUTED='#545d68';
let archive=[],sel={},period=7,chartMode='score',currentTab='record';

// clock
setInterval(()=>{
  document.getElementById('clock').textContent=
    new Date().toLocaleTimeString('bg-BG',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
},1000);

function setSS(s){document.getElementById('sync').className='sync '+s}
function nowDate(){return new Date().toISOString().slice(0,10)}
function nowTime(){const n=new Date();return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')}

document.getElementById('inp-date').value=nowDate();
document.getElementById('inp-time').value=nowTime();
document.getElementById('journal-date').value=nowDate();
document.getElementById('journal-date').addEventListener('change',renderJournal);

function shiftDate(d){
  const dt=new Date(document.getElementById('journal-date').value+'T12:00:00');
  dt.setDate(dt.getDate()+d);
  document.getElementById('journal-date').value=dt.toISOString().slice(0,10);
  renderJournal();
}

function goTab(tab,btn){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  if(tab==='journal')renderJournal();
  if(tab==='graphs')setTimeout(renderChart,50);
  if(tab==='archive')renderArchive();
}

function buildRows(){
  EMO.filter(e=>e.base>0).forEach(e=>addRow('pos-list',e));
  EMO.filter(e=>e.base<0).forEach(e=>addRow('neg-list',e));
}
function addRow(cid,e){
  const isPos=e.base>0,cls=isPos?'pos':'neg';
  const d=document.createElement('div');
  d.className='emo-row';d.id='er-'+e.id;
  d.innerHTML=`
    <div class="emo-main" onclick="toggle('${e.id}')">
      <div class="emo-chk" id="chk-${e.id}"></div>
      <div class="emo-name">${e.name}</div>
      <div class="emo-base ${cls}">${isPos?'+':''}${e.base}</div>
      <div class="emo-eff dim" id="eff-${e.id}">—</div>
    </div>
    <div class="emo-sl" id="slw-${e.id}">
      <span class="sl-lbl">Сила</span>
      <input type="range" min="1" max="10" value="5" id="sl-${e.id}"
        oninput="setInt('${e.id}',+this.value)">
      <span class="sl-val" id="iv-${e.id}">5</span>
    </div>`;
  document.getElementById(cid).appendChild(d);
}

function toggle(id){
  const e=EMO.find(x=>x.id===id);
  const isPos=e.base>0,cls=isPos?'pos':'neg';
  const row=document.getElementById('er-'+id);
  const chk=document.getElementById('chk-'+id);
  const slw=document.getElementById('slw-'+id);
  const eff=document.getElementById('eff-'+id);
  if(sel[id]!==undefined){
    delete sel[id];
    row.className='emo-row';chk.className='emo-chk';chk.textContent='';
    slw.className='emo-sl';eff.className='emo-eff dim';eff.textContent='—';
  }else{
    sel[id]=5;
    row.className='emo-row sel-'+cls;
    chk.className='emo-chk on '+cls;chk.textContent='✓';
    document.getElementById('sl-'+id).value=5;
    document.getElementById('iv-'+id).textContent='5';
    slw.className='emo-sl show';
    eff.className='emo-eff '+cls;
    eff.textContent=(e.base>0?'+':'')+e.base;
  }
  refresh();
}

function setInt(id,val){
  if(sel[id]===undefined) sel[id]=val;
  sel[id]=val;
  document.getElementById('iv-'+id).textContent=val;
  const e=EMO.find(x=>x.id===id);
  const v=Math.round(e.base*(val/5));
  const eff=document.getElementById('eff-'+id);
  eff.className='emo-eff '+(e.base>0?'pos':'neg');
  eff.textContent=(v>0?'+':'')+v;
  refresh();
}

function calcScore(){
  return EMO.reduce((s,e)=>sel[e.id]!==undefined?s+Math.round(e.base*(sel[e.id]/5)):s,0);
}

function refresh(){
  const score=calcScore();
  const sn=document.getElementById('score-num');
  sn.textContent=(score>0?'+':'')+score;
  sn.className='score-num '+(score>0?'pos':score<0?'neg':'zero');
  const active=EMO.filter(e=>sel[e.id]!==undefined)
    .map(e=>({...e,eff:Math.round(e.base*(sel[e.id]/5))}))
    .sort((a,b)=>Math.abs(b.eff)-Math.abs(a.eff));
  document.getElementById('score-dom').textContent=
    active.length?active.slice(0,3).map(e=>e.name).join(', '):'Изберете чувства';
}

function clearSel(){
  Object.keys(sel).forEach(id=>{
    const e=EMO.find(x=>x.id===id);if(!e)return;
    const cls=e.base>0?'pos':'neg';
    const row=document.getElementById('er-'+id);if(row)row.className='emo-row';
    const chk=document.getElementById('chk-'+id);if(chk){chk.className='emo-chk';chk.textContent='';}
    const slw=document.getElementById('slw-'+id);if(slw)slw.className='emo-sl';
    const eff=document.getElementById('eff-'+id);if(eff){eff.className='emo-eff dim';eff.textContent='—';}
  });
  sel={};refresh();
}

async function apiLoad(){
  setSS('busy');
  try{const r=await fetch('/entries?days=365');archive=await r.json();setSS('ok');}
  catch(e){setSS('err');}
  renderJournal();renderArchive();
}
async function apiSave(entry){
  setSS('busy');
  try{await fetch('/entries',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(entry)});setSS('ok');}
  catch(e){setSS('err');}
}
async function apiDelete(ts){
  setSS('busy');
  try{await fetch('/entries?ts='+encodeURIComponent(ts),{method:'DELETE'});setSS('ok');}
  catch(e){setSS('err');}
}

async function saveEntry(){
  const date=document.getElementById('inp-date').value;
  const time=document.getElementById('inp-time').value;
  if(!date||!time)return;
  const emotions=EMO.filter(e=>sel[e.id]!==undefined).map(e=>({
    id:e.id,name:e.name,intensity:sel[e.id],base:e.base,effective:Math.round(e.base*(sel[e.id]/5))
  }));
  if(!emotions.length)return;
  const score=calcScore();
  const ts=date+'T'+time;
  const entry={ts,date,time,score,emotions};
  await apiSave(entry);
  const idx=archive.findIndex(r=>r.ts===ts);
  if(idx>=0)archive[idx]=entry;else archive.unshift(entry);
  archive.sort((a,b)=>b.ts.localeCompare(a.ts));
  document.getElementById('inp-time').value=nowTime();
  clearSel();renderJournal();renderArchive();
  if(currentTab==='graphs')renderChart();
}

function renderJournal(){
  const date=document.getElementById('journal-date').value;
  const entries=archive.filter(r=>r.date===date).sort((a,b)=>b.ts.localeCompare(a.ts));
  const sc=document.getElementById('journal-scroll');
  if(!entries.length){sc.innerHTML='<div class="empty-day">Няма записи за тази дата</div>';return;}
  const last=entries[0];
  const lastSc=last.score;
  const lastDt=new Date(last.date+'T'+last.time).toLocaleString('bg-BG',
    {weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
  const lastPills=last.emotions.map(e=>`<span class="pill ${e.base>0?'pos':'neg'}">${e.name}</span>`).join('');
  const total=entries.reduce((s,r)=>s+r.score,0);
  const freq={};
  entries.forEach(r=>r.emotions.forEach(e=>{
    if(!freq[e.id])freq[e.id]={name:e.name,base:e.base,total:0};
    freq[e.id].total+=e.effective;
  }));
  const dom=Object.values(freq).sort((a,b)=>Math.abs(b.total)-Math.abs(a.total)).slice(0,5);
  const tCls=total>0?'pos':total<0?'neg':'zero';
  const lCls=lastSc>0?'pos':lastSc<0?'neg':'zero';
  sc.innerHTML=`
    <div class="j-card">
      <div class="j-card-lbl"><span>Последен запис</span><span class="j-ts">${lastDt}</span></div>
      <div class="pills">${lastPills}</div>
      <div class="j-foot">
        <span class="j-score ${lCls}">${lastSc>0?'+':''}${lastSc}</span>
        <button class="j-del" onclick="deleteEntry('${last.ts}')">✕ изтрий</button>
      </div>
    </div>
    <div class="j-card">
      <div class="j-card-lbl"><span>Обобщение за деня</span></div>
      <div class="sum-row"><span class="sum-key">Обща оценка</span><span class="sum-val ${tCls}">${total>0?'+':''}${total}</span></div>
      <div class="sum-row"><span class="sum-key">Записа</span><span class="sum-val">${entries.length}</span></div>
      <div class="pills" style="margin-top:8px">${dom.map(d=>`<span class="pill ${d.base>0?'pos':'neg'}">${d.name}</span>`).join('')}</div>
    </div>`;
}

async function deleteEntry(ts){
  await apiDelete(ts);
  archive=archive.filter(r=>r.ts!==ts);
  renderJournal();renderArchive();
  if(currentTab==='graphs')renderChart();
}

function getFiltered(){
  const cut=new Date();cut.setDate(cut.getDate()-period);
  return archive.filter(r=>r.date>=cut.toISOString().slice(0,10));
}

function renderChart(){
  const canvas=document.getElementById('main-chart');
  const wrap=canvas.parentElement;
  const W=wrap.clientWidth,H=wrap.clientHeight;
  if(!W||!H)return;
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const data=getFiltered();
  if(!data.length){
    ctx.fillStyle=MUTED;ctx.font='12px Consolas';ctx.textAlign='center';
    ctx.fillText('Няма данни за периода',W/2,H/2);return;
  }
  const PAD={top:8,right:8,bottom:28,left:36};
  const cW=W-PAD.left-PAD.right,cH=H-PAD.top-PAD.bottom;
  if(chartMode==='score'){
    document.getElementById('chart-title').textContent='Оценка по дни';
    const byDate={};
    data.forEach(r=>{if(!byDate[r.date])byDate[r.date]=0;byDate[r.date]+=r.score;});
    const dates=Object.keys(byDate).sort();
    const vals=dates.map(d=>byDate[d]);
    const maxV=Math.max(Math.abs(Math.min(...vals)),Math.abs(Math.max(...vals)),1);
    const n=dates.length;
    const bW=Math.max(2,Math.floor(cW/n)-2);
    const zero=PAD.top+cH/2;
    ctx.strokeStyle=GRID;ctx.lineWidth=0.5;
    [.25,.5,.75,1].forEach(f=>{
      [PAD.top+cH*f/2,PAD.top+cH-cH*f/2].forEach(y=>{
        ctx.beginPath();ctx.moveTo(PAD.left,y);ctx.lineTo(PAD.left+cW,y);ctx.stroke();
      });
    });
    ctx.strokeStyle='#444c56';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(PAD.left,zero);ctx.lineTo(PAD.left+cW,zero);ctx.stroke();
    ctx.fillStyle=MUTED;ctx.font='9px Consolas';ctx.textAlign='right';
    const step=Math.ceil(maxV/2);
    [-step*2,-step,0,step,step*2].forEach(v=>{
      const y=zero-(v/maxV)*(cH/2);
      if(y<PAD.top-4||y>PAD.top+cH+4)return;
      ctx.fillText((v>0?'+':'')+v,PAD.left-4,y+3);
    });
    dates.forEach((d,i)=>{
      const v=vals[i];
      const x=PAD.left+i*(cW/n)+(cW/n-bW)/2;
      const bH=Math.abs(v/maxV)*(cH/2);
      ctx.fillStyle=v>=0?'rgba(87,171,90,.7)':'rgba(229,83,75,.65)';
      ctx.fillRect(x,v>=0?zero-bH:zero,bW,bH||1);
    });
    ctx.fillStyle=MUTED;ctx.font='9px Consolas';ctx.textAlign='center';
    const skip=Math.ceil(n/10);
    dates.forEach((d,i)=>{
      if(i%skip!==0)return;
      ctx.fillText(new Date(d+'T12:00:00').toLocaleDateString('bg-BG',{day:'2-digit',month:'short'}),
        PAD.left+i*(cW/n)+(cW/n)/2,PAD.top+cH+16);
    });
  }else{
    document.getElementById('chart-title').textContent='Честота на чувствата';
    const freq={};
    data.forEach(r=>r.emotions.forEach(e=>{
      if(!freq[e.name])freq[e.name]={count:0,pos:e.base>0};freq[e.name].count++;
    }));
    const sorted=Object.entries(freq).sort((a,b)=>b[1].count-a[1].count).slice(0,12);
    const n=sorted.length;
    const maxV=Math.max(...sorted.map(x=>x[1].count),1);
    const bW=Math.max(3,Math.floor(cW/n)-2);
    ctx.strokeStyle=GRID;ctx.lineWidth=0.5;
    [.25,.5,.75,1].forEach(f=>{
      const y=PAD.top+cH-cH*f;
      ctx.beginPath();ctx.moveTo(PAD.left,y);ctx.lineTo(PAD.left+cW,y);ctx.stroke();
    });
    ctx.fillStyle=MUTED;ctx.font='9px Consolas';ctx.textAlign='right';
    [1,2,3,4].forEach(f=>{
      ctx.fillText(Math.round(maxV*f/4),PAD.left-4,PAD.top+cH-cH*f/4+3);
    });
    sorted.forEach(([lbl,d],i)=>{
      const bH=(d.count/maxV)*cH;
      ctx.fillStyle=d.pos?'rgba(87,171,90,.7)':'rgba(229,83,75,.65)';
      ctx.fillRect(PAD.left+i*(cW/n)+(cW/n-bW)/2,PAD.top+cH-bH,bW,bH||1);
    });
    ctx.fillStyle=MUTED;ctx.font='9px Consolas';ctx.textAlign='center';
    sorted.forEach(([lbl],i)=>{
      ctx.fillText(lbl.length>7?lbl.slice(0,6)+'…':lbl,
        PAD.left+i*(cW/n)+(cW/n)/2,PAD.top+cH+16);
    });
  }
}

function setPeriod(p,btn){
  period=p;
  document.querySelectorAll('.per-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderChart();
}
function setMode(m,btn){
  chartMode=m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderChart();
}
window.addEventListener('resize',()=>{if(currentTab==='graphs')renderChart();});

function renderArchive(){
  const scroll=document.getElementById('arch-scroll');
  document.getElementById('arch-count').textContent=archive.length+' записа';
  if(!archive.length){scroll.innerHTML='<div class="arch-empty">Няма записи</div>';return;}
  scroll.innerHTML=archive.map(r=>{
    const sc=r.score;
    const scCls=sc>0?'pos':sc<0?'neg':'zero';
    const dt=new Date(r.date+'T'+r.time).toLocaleString('bg-BG',
      {weekday:'short',day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
    const pills=r.emotions.slice().sort((a,b)=>Math.abs(b.effective)-Math.abs(a.effective))
      .map(e=>`<span class="pill ${e.base>0?'pos':'neg'}">${e.name}</span>`).join('');
    return`<div class="arch-entry">
      <div class="arch-dt">${dt}</div>
      <div class="arch-pills">${pills}</div>
      <div class="arch-foot">
        <span class="arch-score ${scCls}">${sc>0?'+':''}${sc}</span>
        <button class="arch-del" onclick="deleteEntry('${r.ts}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

async function clearArchive(){
  if(!confirm('Изтриване на целия архив?'))return;
  for(const r of archive)await apiDelete(r.ts);
  archive=[];renderArchive();renderJournal();
  if(currentTab==='graphs')renderChart();
}

buildRows();refresh();apiLoad();
</script>
